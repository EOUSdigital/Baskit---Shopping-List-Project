        <!-- MAIN -->
        <main id="main">
            <div class="page-inner">
                <!-- Combined Landing Page View -->
                <section id="allProducts" aria-labelledby="allProducts-heading"><div class="page-inner"></div></section>

                <section id="grocery" aria-labelledby="grocery-heading"><div class="page-inner"></div></section>

                <section id="household" aria-labelledby="household-heading"><div class="page-inner"></div></section>

                <section id="stationery" aria-labelledby="stationery-heading"><div class="page-inner"></div></section>

                <!-- Shopping List Basket -->
                <section id="shoppingBasket">
                    <div class="page-inner">
                        <div class="heroBasket">A small slider with different information.</div>

                        <div class="basketTitle">
                            <h2>Shopping Basket</h2>
                        </div>
                        <div class="basketSavedTotal">
                            <p class="basketSavedSubtotal">Subtotal </p>
                            <p class="basketSavedItems">(<span>0</span> items):</p>
                            <p class="basketSavedPriceTotal">£ <span>0</span></p>
                        </div>
                    </div>
                </section>

                <section id="savedItems">
                    <div class="page-inner">
                        <div class="basketSavedItems">
                            <div class="basketSavedTitle">
                                <h2>Your Items</h2>
                            </div>
                            <div class="basketSavedTotal">
                                <p class="basketSavedSubtotal">Subtotal </p>
                                <p class="basketSavedItems">(<span>0</span> items):</p>
                                <p class="basketSavedPriceTotal">£ <span>0</span></p>
                            </div>
                        </div>
                    </div>
                </section>

                    <div id="cancel">
                        <p>Forgot to add something to your cart? Shop around then come back to pay!</p>
                    </div>

                <!-- Slider Animation -->
                <template id="slider-animation">
                    <div class="animated-slider">
                        <div class="slide active">
                            <img srcset="" />
                            <div class="caption zoom-in">Explore</div>
                        </div>
                        <div class="slide">
                            <img srcset="" />
                            <div class="caption slide-left">Lights</div>
                        </div>
                        <div class="slide">
                            <img srcset="" />
                            <div class="caption fade-in">Space</div>
                        </div>
                    </div>
                </template>

                <!-- Card Wrapper -->
                <template id="product-template">
                    <div class="cardItem">
                        <img src="" alt="">
                        <h3 class="cardHeading"><a href="#" class="cardLink"></a></h3>
                        <p class="cardDescription"></p>
                        <p class="cardPrice">£<span></span></p>
                        <button class="cardSubmit" type="button">Add to basket</button>
                    </div>
                </template>

                <!-- Saved Item Basket -->
                <template id="basket-template">
                    <div class="basketCard">
                        <div class="basketItem">
                            <input type="checkbox" class="selectItem" aria-label="Select item to delete or save for later" />
                            <img src="" alt="">
                            <h3 class="basketProductHeading"></h3>
                            <p class="basketProductDescription"></p>
                            <p class="priceProductDetails">£ <span>0.00</span></p>
                        </div>

                        <div class="basketActionLinks">
                            <button type="button" class="basketProductDecrease" aria-label="Decrease quantity">-</button>
                            <span class="basketProductQuantity" aria-live="polite">1</span>
                            <button type="button" class="basketIncrease" aria-label="Increase quantity">+</button>
                            <button type="button" class="basketDelete">Delete</button>
                            <button type="button" class="basketSave">Save for later</button>
                            <button type="button" class="basketShare">Share</button>
                        </div>
                    </div>    
                </template>
            </div>

                    <p class="contact">Contact</p>
